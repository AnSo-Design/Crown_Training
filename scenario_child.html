<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nordic Crown — Emergency Training</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f4f2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 3rem;
  }

  .top-bar {
    width: 100%;
    background: #c0392b;
    padding: 1rem 1.25rem 0.85rem;
    color: white;
  }

  .top-bar .label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 2px;
  }

  .top-bar .title {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.2;
  }

  .top-bar .location {
    font-size: 12px;
    opacity: 0.75;
    margin-top: 3px;
  }

  .progress-wrap {
    background: rgba(255,255,255,0.3);
    border-radius: 99px;
    height: 3px;
    margin-top: 12px;
  }

  .progress-fill {
    height: 3px;
    border-radius: 99px;
    background: white;
    transition: width 0.4s ease;
    width: 0%;
  }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 1.25rem;
  }

  .step-label {
    font-size: 15px;
    color: #888;
    text-align: center;
    margin-bottom: 1rem;
    letter-spacing: 0.03em;
  }

  .scene-card {
    background: white;
    border-radius: 14px;
    padding: 1rem 1.125rem;
    margin-bottom: 1rem;
    border: 1px solid #e8e6e0;
  }

  .scene-label {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #aaa;
    margin-bottom: 6px;
  }

  .scene-text {
    font-size: 15px;
    color: #222;
    line-height: 1.65;
  }

  .question-label {
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 10px;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .choice-btn {
    width: 100%;
    text-align: left;
    background: white;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 14px;
    color: #222;
    cursor: pointer;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: background 0.1s, border-color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .choice-btn:active { background: #f4f4f2; }

  .choice-btn.correct {
    border-color: #2e9e5b;
    background: #f0faf4;
  }

  .choice-btn.wrong {
    border-color: #c0392b;
    background: #fdf2f1;
  }

  .choice-btn:disabled { cursor: default; }

  .choice-letter {
    font-size: 11px;
    font-weight: 600;
    color: #bbb;
    min-width: 16px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .choice-btn.correct .choice-letter { color: #2e9e5b; }
  .choice-btn.wrong .choice-letter { color: #c0392b; }

  .feedback-card {
    border-radius: 12px;
    padding: 0.875rem 1rem;
    margin-top: 1rem;
    border: 1px solid;
  }

  .feedback-card.correct {
    background: #f0faf4;
    border-color: #a8dfc0;
  }

  .feedback-card.wrong {
    background: #fdf2f1;
    border-color: #f5c0ba;
  }

  .feedback-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 5px;
  }

  .feedback-card.correct .feedback-title { color: #1e7a42; }
  .feedback-card.wrong .feedback-title { color: #a0291e; }

  .feedback-text {
    font-size: 13px;
    line-height: 1.6;
    color: #555;
  }

  .next-btn {
    width: 100%;
    padding: 0.875rem;
    background: #c0392b;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 1rem;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }

  .next-btn:active { background: #a0291e; }

  .intro-wrap { text-align: center; padding-top: 0.5rem; }

  .intro-badge {
    display: inline-block;
    background: #fdf2f1;
    color: #a0291e;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 99px;
    margin-bottom: 1rem;
    border: 1px solid #f5c0ba;
  }

  .intro-title {
    font-size: 21px;
    font-weight: 700;
    color: #222;
    line-height: 1.25;
    margin-bottom: 0.75rem;
  }

  .intro-desc {
    font-size: 14px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }

  .intro-meta {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1.75rem;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .meta-value {
    font-size: 20px;
    font-weight: 700;
    color: #222;
  }

  .meta-label {
    font-size: 11px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .start-btn {
    width: 100%;
    padding: 1rem;
    background: #c0392b;
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }

  .start-btn:active { background: #a0291e; }

  .summary-wrap { text-align: center; padding-top: 0.5rem; }

  .summary-score {
    font-size: 52px;
    font-weight: 700;
    color: #222;
    line-height: 1;
    margin: 0.5rem 0 0.25rem;
  }

  .summary-sub {
    font-size: 14px;
    color: #888;
    margin-bottom: 1.5rem;
  }

  .review-list {
    background: white;
    border-radius: 14px;
    border: 1px solid #e8e6e0;
    overflow: hidden;
    margin-bottom: 1rem;
    text-align: left;
  }

  .review-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid #f0eeea;
  }

  .review-item:last-child { border-bottom: none; }

  .review-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .review-dot.correct { background: #2e9e5b; }
  .review-dot.wrong { background: #c0392b; }

  .review-text {
    font-size: 13px;
    color: #555;
    line-height: 1.4;
  }

  .divider {
    height: 1px;
    background: #e8e6e0;
    margin: 1.25rem 0;
  }

  .restart-btn {
    width: 100%;
    padding: 0.75rem;
    background: transparent;
    border: 1px solid #ccc;
    border-radius: 12px;
    font-size: 14px;
    color: #222;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .restart-btn:active { background: #eee; }

  .note-card {
    background: #fffbf0;
    border: 1px solid #f0d080;
    border-radius: 12px;
    padding: 0.875rem 1rem;
    margin-top: 1rem;
    font-size: 13px;
    color: #7a5c00;
    line-height: 1.55;
  }

  .note-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #b07800;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="label">Nordic Crown — Emergency Training</div>
  <div class="title" id="bar-title">Child left alone in cabin</div>
  <div class="progress-wrap">
    <div class="progress-fill" id="progress"></div>
  </div>
</div>

<div class="container" id="content"></div>

<script>
const steps = [
  {
    scene: "You are evacuating your assigned area. You open a cabin door, and find a child alone — around 8 years old — sitting on the bed, crying. The child looks at you and says: 'My mum and dad are upstairs, but I don't know where. I don't want to leave without them.'",
    question: "What is your first response?",
    choices: [
      {
        text: "Tell the child firmly that they must come with you immediately — this is an emergency",
        correct: false,
        feedback: "Issuing a firm command to a frightened child almost always makes the situation worse. Try explaing the situation calmly first."
      },
      {
        text: "Step into the cabin, crouch down to the child's level, speak calmly: 'I'm here to help you. What's your name?'",
        correct: true,
        feedback: "Getting down to the child's physical level and asking their name makes them feel safe. A calm voice also signals that you are in control of the situation, which helps reduce their fear."
      },
      {
        text: "Leave the cabin and find the zone leader immediately to report an unaccompanied child",
        correct: false,
        feedback: "You should not leave an unaccompanied child alone in a cabin during an evacuation alarm. You are the responsible adult in this moment."
      }
    ]
  },
  {
    scene: "The child tells you their name is Lucas. He says his parents went up to sit outside and told him to go to sleep. He says he won't move until they come back.",
    question: "How do you get Lucas moving?",
    choices: [
      {
        text: "Tell Lucas this is just a drill and there is no real danger, so he can come with you without worrying",
        correct: false,
        feedback: "Even if this is a drill, you should never tell passengers it is not a real emergency. Passengers must always respond as if the alarm is real."
      },
      {
        text: "Tell Lucas that if he follows you to the muster station, the zone leader will help him find his parents",
        correct: true,
        feedback: "Yes, the zone leader can communicate with others to locate his parents and reunite them."
      },
      {
        text: "Promise Lucas you will personally find his parents and bring them to him if he comes with you now",
        correct: false,
        feedback: "Making promises you cannot keep is a risk. You do not have a radio, you cannot leave Lucas, and you cannot guarantee you will find his parents. This should be handled by your zone leader."
      }
    ]
  },
  {
    scene: "Lucas agrees to come with you. You take his hand and step into the corridor.",
    question: "What do you do next?",
    choices: [
      {
        text: "Finish your full cabin sweep first, then take Lucas to the zone leader at the end",
        correct: false,
        feedback: "Completing the sweep before handing Lucas over delays critical information reaching the zone leader. His parents may be at the muster station already, worried about their child. The handover takes only a few minutes — do it first, then return to your sweep."
      },
      {
        text: "Leave Lucas in the corridor and continue your sweep — he is old enough to find the muster station himself",
        correct: false,
        feedback: "An 8-year-old alone in a corridor during an active evacuation alarm is not safe. He does not know the ship, he is already frightened, and leaving him unaccompanied could make the situation significantly worse."
      },
      {
        text: "Take Lucas directly to the zone leader at the muster station, hand him over, explain the situation, then return to continue your cabin sweep",
        correct: true,
        feedback: "The zone leader has the radio, the authority, and the overview to handle an unaccompanied child and locate his parents. The muster station is close, the handover is quick, and you can return to your sweep immediately."
      }
    ]
  }
];

let current = -1;
let selected = null;
let results = [];

function setProgress(pct) {
  document.getElementById('progress').style.width = pct + '%';
}

function render() {
  const content = document.getElementById('content');

  if (current === -1) { renderIntro(content); return; }
  if (current >= steps.length) { renderSummary(content); return; }

  setProgress((current / steps.length) * 100);
  const step = steps[current];
  const answered = selected !== null;
  const letters = ['A','B','C','D'];

  const choicesHTML = step.choices.map((c, i) => {
    let cls = 'choice-btn';
    if (answered) {
      if (c.correct) cls += ' correct';
      else if (i === selected) cls += ' wrong';
    }
    return `<button class="${cls}" onclick="choose(${i})" ${answered ? 'disabled' : ''}>
      <span class="choice-letter">${letters[i]}</span>
      <span>${c.text}</span>
    </button>`;
  }).join('');

  let feedbackHTML = '';
  if (answered) {
    const c = step.choices[selected];
    const isLast = current === steps.length - 1;
    feedbackHTML = `
      <div class="feedback-card ${c.correct ? 'correct' : 'wrong'}">
        <div class="feedback-title">${c.correct ? 'Good choice' : 'Not quite'}</div>
        <div class="feedback-text">${c.feedback}</div>
      </div>
      <button class="next-btn" onclick="next()">${isLast ? 'See my results →' : 'Next situation →'}</button>`;
  }

  content.innerHTML = `
    <div class="step-label">Situation ${current + 1} of ${steps.length}</div>
    <div class="scene-card">
      <div class="scene-label">Situation</div>
      <div class="scene-text">${step.scene}</div>
    </div>
    <div class="question-label">${step.question}</div>
    <div class="choices">${choicesHTML}</div>
    <div id="feedback">${feedbackHTML}</div>`;
}

function renderIntro(content) {
  setProgress(0);
  document.getElementById('bar-title').textContent = 'Child left alone in cabin';
  content.innerHTML = `
    <div class="intro-wrap">
      <div class="intro-badge">Emergency Training Scenario</div>
      <div class="intro-title">You find a child alone in a cabin during evacuation</div>
      <div class="intro-desc">You are evacuating the area designated on you safety card. You find a child alone in a cabin who refuses to leave without their parents. What do you do?</div>
      <div class="intro-meta">
        <div class="meta-item">
          <div class="meta-value">3</div>
          <div class="meta-label">Situations</div>
        </div>
        <div class="meta-item">
          <div class="meta-value">~4 min</div>
          <div class="meta-label">Duration</div>
        </div>
      </div>
      <button class="start-btn" onclick="startScenario()">Start scenario</button>
    </div>`;
}

function renderSummary(content) {
  setProgress(100);
  document.getElementById('bar-title').textContent = 'Results';
  const score = results.filter(r => r.correct).length;
  const total = results.length;
  let msg = '';
  if (score === total) msg = 'All correct — excellent work.';
  else if (score >= 2) msg = 'Good. Review the situations you missed before the next drill.';
  else msg = 'Go through this scenario with your zone leader at the debrief.';

  const reviewItems = results.map((r, i) => `
    <div class="review-item">
      <div class="review-dot ${r.correct ? 'correct' : 'wrong'}"></div>
      <div class="review-text">Situation ${i + 1} — ${r.correct ? 'correct response' : 'review recommended'}</div>
    </div>`).join('');

  content.innerHTML = `
    <div class="summary-wrap">
      <div class="step-label">Scenario complete</div>
      <div class="summary-score">${score}/${total}</div>
      <div class="summary-sub">${msg}</div>
    </div>
    <div class="review-list">${reviewItems}</div>
    <div class="divider"></div>
    <button class="restart-btn" onclick="restart()">Restart scenario</button>`;
}

function startScenario() {
  current = 0; selected = null; results = [];
  steps.forEach(step => {
    step.choices.sort(() => Math.random() - 0.5);
  });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function choose(i) {
  if (selected !== null) return;
  selected = i;
  results.push({ correct: steps[current].choices[i].correct });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function next() {
  current++; selected = null;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  current = -1; selected = null; results = [];
  steps.forEach(step => {
    step.choices.sort(() => Math.random() - 0.5);
  });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
</body>
</html>
