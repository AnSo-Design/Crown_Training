<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nordic Crown — Emergency Training</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f4f2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 3rem;
  }

  .top-bar {
    width: 100%;
    background: #c0392b;
    padding: 1rem 1.25rem 0.85rem;
    color: white;
  }

  .top-bar .label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 2px;
  }

  .top-bar .title {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.2;
  }

  .top-bar .location {
    font-size: 12px;
    opacity: 0.75;
    margin-top: 3px;
  }

  .progress-wrap {
    background: rgba(255,255,255,0.3);
    border-radius: 99px;
    height: 3px;
    margin-top: 12px;
  }

  .progress-fill {
    height: 3px;
    border-radius: 99px;
    background: white;
    transition: width 0.4s ease;
    width: 0%;
  }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 1.25rem;
  }

  .step-label {
    font-size: 12px;
    color: #888;
    text-align: center;
    margin-bottom: 1rem;
  }

  .scene-card {
    background: white;
    border-radius: 14px;
    padding: 1rem 1.125rem;
    margin-bottom: 1rem;
    border: 1px solid #e8e6e0;
  }

  .scene-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #aaa;
    margin-bottom: 6px;
  }

  .scene-text {
    font-size: 15px;
    color: #222;
    line-height: 1.65;
  }

  .question-label {
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 10px;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .choice-btn {
    width: 100%;
    text-align: left;
    background: white;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 14px;
    color: #222;
    cursor: pointer;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    -webkit-tap-highlight-color: transparent;
  }

  .choice-btn:active { background: #f4f4f2; }
  .choice-btn.correct { border-color: #2e9e5b; background: #f0faf4; }
  .choice-btn.wrong { border-color: #c0392b; background: #fdf2f1; }
  .choice-btn:disabled { cursor: default; }

  .choice-letter {
    font-size: 11px;
    font-weight: 600;
    color: #bbb;
    min-width: 16px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .choice-btn.correct .choice-letter { color: #2e9e5b; }
  .choice-btn.wrong .choice-letter { color: #c0392b; }

  .feedback-card {
    border-radius: 12px;
    padding: 0.875rem 1rem;
    margin-top: 1rem;
    border: 1px solid;
  }

  .feedback-card.correct { background: #f0faf4; border-color: #a8dfc0; }
  .feedback-card.wrong { background: #fdf2f1; border-color: #f5c0ba; }

  .feedback-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 5px;
  }

  .feedback-card.correct .feedback-title { color: #1e7a42; }
  .feedback-card.wrong .feedback-title { color: #a0291e; }

  .feedback-text {
    font-size: 13px;
    line-height: 1.6;
    color: #555;
  }

  .next-btn {
    width: 100%;
    padding: 0.875rem;
    background: #c0392b;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 1rem;
    -webkit-tap-highlight-color: transparent;
  }

  .next-btn:active { background: #a0291e; }

  .note-card {
    background: #fffbf0;
    border: 1px solid #f0d080;
    border-radius: 12px;
    padding: 0.875rem 1rem;
    margin-top: 1rem;
    font-size: 13px;
    color: #7a5c00;
    line-height: 1.55;
  }

  .note-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #b07800;
    margin-bottom: 4px;
  }

  /* Timer */
  .timer-wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: white;
    border-radius: 12px;
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
    border: 1px solid #e8e6e0;
  }

  .timer-label {
    font-size: 12px;
    color: #888;
  }

  .timer-display {
    font-size: 22px;
    font-weight: 700;
    color: #222;
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }

  .timer-display.urgent { color: #c0392b; }

  .timer-bar-wrap {
    flex: 1;
    margin: 0 1rem;
    height: 4px;
    background: #e8e6e0;
    border-radius: 99px;
    overflow: hidden;
  }

  .timer-bar-fill {
    height: 4px;
    border-radius: 99px;
    background: #2e9e5b;
    transition: width 1s linear, background 0.3s;
  }

  /* Drag and drop */
  .drag-instruction {
    font-size: 13px;
    color: #666;
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .drag-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 1rem;
  }

  .drag-item {
    background: white;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-size: 14px;
    color: #222;
    line-height: 1.4;
    cursor: grab;
    display: flex;
    align-items: center;
    gap: 10px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s;
  }

  .drag-item.dragging {
    opacity: 0.5;
    cursor: grabbing;
  }

  .drag-item.over {
    border-color: #c0392b;
    background: #fdf2f1;
  }

  .drag-item.correct-order {
    border-color: #2e9e5b;
    background: #f0faf4;
  }

  .drag-item.wrong-order {
    border-color: #c0392b;
    background: #fdf2f1;
  }

  .drag-handle {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex-shrink: 0;
    opacity: 0.35;
  }

  .drag-handle span {
    display: block;
    width: 16px;
    height: 2px;
    background: #555;
    border-radius: 1px;
  }

  .drag-num {
    font-size: 11px;
    font-weight: 700;
    color: #bbb;
    min-width: 18px;
    flex-shrink: 0;
  }

  .drag-item.correct-order .drag-num { color: #2e9e5b; }
  .drag-item.wrong-order .drag-num { color: #c0392b; }

  .submit-btn {
    width: 100%;
    padding: 0.875rem;
    background: #333;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .submit-btn:active { background: #111; }
  .submit-btn:disabled { background: #bbb; cursor: default; }

  .timeout-card {
    background: #fdf2f1;
    border: 1px solid #f5c0ba;
    border-radius: 12px;
    padding: 0.875rem 1rem;
    margin-bottom: 1rem;
    text-align: center;
  }

  .timeout-title {
    font-size: 14px;
    font-weight: 600;
    color: #a0291e;
    margin-bottom: 4px;
  }

  .timeout-text {
    font-size: 13px;
    color: #555;
    line-height: 1.5;
  }

  /* Intro */
  .intro-wrap { text-align: center; padding-top: 0.5rem; }

  .intro-badge {
    display: inline-block;
    background: #fdf2f1;
    color: #a0291e;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 99px;
    margin-bottom: 1rem;
    border: 1px solid #f5c0ba;
  }

  .intro-title {
    font-size: 21px;
    font-weight: 700;
    color: #222;
    line-height: 1.25;
    margin-bottom: 0.75rem;
  }

  .intro-desc {
    font-size: 14px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }

  .intro-meta {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1.75rem;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .meta-value { font-size: 20px; font-weight: 700; color: #222; }
  .meta-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.06em; }

  .start-btn {
    width: 100%;
    padding: 1rem;
    background: #c0392b;
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .start-btn:active { background: #a0291e; }

  /* Summary */
  .summary-wrap { text-align: center; padding-top: 0.5rem; }
  .summary-score { font-size: 52px; font-weight: 700; color: #222; line-height: 1; margin: 0.5rem 0 0.25rem; }
  .summary-sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }

  .review-list {
    background: white;
    border-radius: 14px;
    border: 1px solid #e8e6e0;
    overflow: hidden;
    margin-bottom: 1rem;
    text-align: left;
  }

  .review-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid #f0eeea;
  }

  .review-item:last-child { border-bottom: none; }

  .review-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .review-dot.correct { background: #2e9e5b; }
  .review-dot.wrong { background: #c0392b; }
  .review-text { font-size: 13px; color: #555; line-height: 1.4; }

  .divider { height: 1px; background: #e8e6e0; margin: 1.25rem 0; }

  .restart-btn {
    width: 100%;
    padding: 0.75rem;
    background: transparent;
    border: 1px solid #ccc;
    border-radius: 12px;
    font-size: 14px;
    color: #888;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .restart-btn:active { background: #eee; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="label">Nordic Crown — Emergency Training</div>
  <div class="title" id="bar-title">First Response: Cardiac Emergency</div>
  <div class="location">Restaurant · Main Deck</div>
  <div class="progress-wrap">
    <div class="progress-fill" id="progress"></div>
  </div>
</div>

<div class="container" id="content"></div>

<script>
const TOTAL_STEPS = 4;
const CPR_TIME = 120;

const mcSteps = [
  {
    type: 'mc',
    scene: "You are serving tables in the restaurant during the evening service. A man in his 60s suddenly slumps forward in his chair and slides to the floor. Other guests at the table look panicked. He is not moving.",
    question: "What is your first action?",
    choices: [
      {
        text: "Shout for help immediately so other crew members know something is wrong",
        correct: false,
        feedback: "Calling for help is important — but it is not the first step. Before anything else, you need to assess whether the man is actually unconscious. He may have fainted or tripped. Check him first, then call for help."
      },
      {
        text: "Kneel beside him, tap his shoulders firmly, and call out loudly: 'Can you hear me? Are you okay?'",
        correct: true,
        feedback: "Correct. This is the responsiveness check — the first step in basic life support. You need to establish whether he is conscious before doing anything else. Tap firmly on both shoulders and speak loudly directly to him."
      },
      {
        text: "Check his wrist immediately for a pulse",
        correct: false,
        feedback: "Checking for a pulse is not the first step and is unreliable without medical training. The correct sequence is: check responsiveness first, then check for normal breathing, then act. Go to him and try to get a response."
      },
      {
        text: "Ask the guests at the table what happened before doing anything",
        correct: false,
        feedback: "There is no time for a witness interview. The man is on the floor and not moving — get to him immediately and check whether he is responsive. You can gather information later."
      }
    ]
  },
  {
    type: 'mc',
    scene: "He does not respond to your shoulder taps or your voice. You tilt his head back gently and lift his chin to open his airway. You look, listen, and feel for normal breathing for no more than 10 seconds. He is not breathing normally.",
    question: "What do you do right now?",
    choices: [
      {
        text: "Begin CPR immediately — you will call for help once you have started compressions",
        correct: false,
        feedback: "Do not start CPR alone without first alerting others. You need someone to call the ship's emergency number and someone to fetch the AED. Shout for help first — ideally send two different people on two different tasks — then begin CPR."
      },
      {
        text: "Shout loudly for help: ask one person to call the ship's emergency number and another to find the nearest AED, then begin CPR",
        correct: true,
        feedback: "Correct. This is the critical sequence: alert others and delegate tasks before you start CPR, because once you begin compressions you cannot stop. Send one person to call for emergency assistance and another to locate the AED. Then get on the floor and begin."
      },
      {
        text: "Run to find the nearest AED yourself — it is the most important piece of equipment",
        correct: false,
        feedback: "Do not leave the patient to find the AED yourself. You are the first responder — your job is to stay with him and begin CPR. Send someone else for the AED. Every second you are away from him is a second without compressions."
      },
      {
        text: "Place him in the recovery position and wait for a colleague with medical training to arrive",
        correct: false,
        feedback: "The recovery position is for unconscious patients who are breathing. This man is not breathing normally — he needs CPR immediately, not the recovery position. Do not wait for someone else to start."
      }
    ]
  },
  {
    type: 'drag',
    scene: "Help is coming and someone has gone for the AED. You are alone with the man and need to begin CPR. Put the steps in the correct order before time runs out.",
    question: "Arrange the CPR steps in the correct order",
    items: [
      { id: 'a', text: "Place the heel of one hand on the centre of his chest, interlock your fingers, and keep your arms straight" },
      { id: 'b', text: "Tilt his head back and lift his chin to make sure the airway is open" },
      { id: 'c', text: "Give 2 rescue breaths — pinch his nose, seal your lips around his mouth, and blow steadily for about 1 second each" },
      { id: 'd', text: "Press down hard and fast — compress the chest at least 5 cm, 30 times, at a rate of 100–120 per minute" },
      { id: 'e', text: "Continue the cycle: 30 compressions followed by 2 rescue breaths, without stopping" },
    ],
    correctOrder: ['b', 'a', 'd', 'c', 'e']
  },
  {
    type: 'mc',
    scene: "A colleague arrives with the AED. It is a yellow box with a green button. Neither of you has used one before in a real situation. The man is still unresponsive.",
    question: "What do you do with the AED?",
    choices: [
      {
        text: "Turn it on and follow the voice instructions exactly — the AED will guide you through every step",
        correct: true,
        feedback: "Correct. AEDs are designed to be used by anyone — they give clear spoken instructions and will not deliver a shock unless it is safe to do so. Turn it on, attach the pads as shown in the diagrams on the pads themselves, and follow every instruction it gives. Do not hesitate."
      },
      {
        text: "Wait for a medically trained crew member — using an AED without training could cause harm",
        correct: false,
        feedback: "An AED will not shock the patient unless it detects a shockable rhythm — it is safe to use without medical training. Every minute without defibrillation reduces survival chances by around 10%. Do not wait. Turn it on and follow the instructions."
      },
      {
        text: "Continue CPR and let your colleague operate the AED — one person cannot do both",
        correct: false,
        feedback: "When the AED is ready to use, CPR must pause briefly so the device can analyse the heart rhythm. Follow the AED's instructions — it will tell you when to stop compressions and when to resume. One person can manage this with the device guiding them."
      },
      {
        text: "Attach the pads from memory — one on the upper right chest, one on the lower left side",
        correct: false,
        feedback: "The pad placement is shown clearly on the pads themselves with diagrams. Always follow the diagrams on the pads and the AED's voice instructions rather than relying on memory under pressure. Turn the device on first — it will guide you."
      }
    ]
  }
];

let current = -1;
let selected = null;
let results = [];
let timerInterval = null;
let timeLeft = CPR_TIME;
let dragOrder = [];
let draggingIndex = null;
let timedOut = false;
let dragSubmitted = false;

function setProgress(pct) {
  document.getElementById('progress').style.width = pct + '%';
}

function render() {
  const content = document.getElementById('content');
  if (current === -1) { renderIntro(content); return; }
  if (current >= TOTAL_STEPS) { renderSummary(content); return; }

  const step = mcSteps[current];
  setProgress((current / TOTAL_STEPS) * 100);

  if (step.type === 'mc') renderMC(content, step);
  else if (step.type === 'drag') renderDrag(content, step);
}

function renderIntro(content) {
  setProgress(0);
  document.getElementById('bar-title').textContent = 'First Response: Cardiac Emergency';
  content.innerHTML = `
    <div class="intro-wrap">
      <div class="intro-badge">Emergency Training Scenario</div>
      <div class="intro-title">A guest collapses in the restaurant</div>
      <div class="intro-desc">You are serving tables during the evening service when a guest suddenly collapses. No medical staff are nearby. You are first on the scene.</div>
      <div class="intro-meta">
        <div class="meta-item"><div class="meta-value">4</div><div class="meta-label">Situations</div></div>
        <div class="meta-item"><div class="meta-value">~4 min</div><div class="meta-label">Duration</div></div>
        <div class="meta-item"><div class="meta-value">Timer</div><div class="meta-label">Included</div></div>
      </div>
      <button class="start-btn" onclick="startScenario()">Start scenario</button>
    </div>`;
}

function renderMC(content, step) {
  const answered = selected !== null;
  const letters = ['A','B','C','D'];

  const choicesHTML = step.choices.map((c, i) => {
    let cls = 'choice-btn';
    if (answered && i === selected) cls += c.correct ? ' correct' : ' wrong';
    return `<button class="${cls}" onclick="choose(${i})" ${answered ? 'disabled' : ''}>
      <span class="choice-letter">${letters[i]}</span>
      <span>${c.text}</span>
    </button>`;
  }).join('');

  let feedbackHTML = '';
  if (answered) {
    const c = step.choices[selected];
    const isLast = current === TOTAL_STEPS - 1;
    const noteHTML = !c.correct ? `
      <div class="note-card">
        <div class="note-label">Remember</div>
        The correct response was: <strong>${step.choices.find(x => x.correct).text}</strong>
      </div>` : '';
    feedbackHTML = `
      <div class="feedback-card ${c.correct ? 'correct' : 'wrong'}">
        <div class="feedback-title">${c.correct ? 'Good choice' : 'Not quite'}</div>
        <div class="feedback-text">${c.feedback}</div>
      </div>
      ${noteHTML}
      <button class="next-btn" onclick="next()">${isLast ? 'See my results →' : 'Next situation →'}</button>`;
  }

  content.innerHTML = `
    <div class="step-label">Situation ${current + 1} of ${TOTAL_STEPS}</div>
    <div class="scene-card">
      <div class="scene-label">Situation</div>
      <div class="scene-text">${step.scene}</div>
    </div>
    <div class="question-label">${step.question}</div>
    <div class="choices">${choicesHTML}</div>
    <div>${feedbackHTML}</div>`;
}

function renderDrag(content, step) {
  timeLeft = CPR_TIME;
  timedOut = false;
  dragSubmitted = false;

  if (!dragOrder.length) {
    dragOrder = [...step.items].sort(() => Math.random() - 0.5).map(i => i.id);
  }

  content.innerHTML = `
    <div class="step-label">Situation ${current + 1} of ${TOTAL_STEPS}</div>
    <div class="scene-card">
      <div class="scene-label">Situation</div>
      <div class="scene-text">${step.scene}</div>
    </div>
    <div class="timer-wrap">
      <span class="timer-label">Time remaining</span>
      <div class="timer-bar-wrap"><div class="timer-bar-fill" id="tbar" style="width:100%"></div></div>
      <span class="timer-display" id="tdisp">2:00</span>
    </div>
    <div class="question-label">${step.question}</div>
    <div class="drag-instruction">Drag the steps into the correct order, then tap Submit.</div>
    <div class="drag-list" id="draglist"></div>
    <button class="submit-btn" id="submitbtn" onclick="submitDrag()">Submit order</button>`;

  renderDragList();
  startTimer();
}

function renderDragList() {
  const step = mcSteps[current];
  const list = document.getElementById('draglist');
  if (!list) return;

  list.innerHTML = dragOrder.map((id, idx) => {
    const item = step.items.find(i => i.id === id);
    let cls = 'drag-item';
    if (dragSubmitted) {
      cls += step.correctOrder[idx] === id ? ' correct-order' : ' wrong-order';
    }
    return `<div class="${cls}" id="ditem-${id}" draggable="true"
      ondragstart="dragStart(event,'${id}')"
      ondragover="dragOver(event,'${id}')"
      ondragleave="dragLeave(event,'${id}')"
      ondrop="dragDrop(event,'${id}')"
      ontouchstart="touchStart(event,'${id}')"
      ontouchmove="touchMove(event)"
      ontouchend="touchEnd(event,'${id}')">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <span class="drag-num">${idx + 1}</span>
      <span>${item.text}</span>
    </div>`;
  }).join('');
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    const disp = document.getElementById('tdisp');
    const bar = document.getElementById('tbar');
    if (!disp) { clearInterval(timerInterval); return; }

    disp.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
    const pct = (timeLeft / CPR_TIME) * 100;
    if (bar) {
      bar.style.width = pct + '%';
      bar.style.background = timeLeft <= 30 ? '#c0392b' : timeLeft <= 60 ? '#e67e22' : '#2e9e5b';
    }
    if (timeLeft <= 30) disp.classList.add('urgent');

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      handleTimeout();
    }
  }, 1000);
}

function handleTimeout() {
  timedOut = true;
  dragSubmitted = true;
  renderDragList();
  const step = mcSteps[current];
  const isCorrect = JSON.stringify(dragOrder) === JSON.stringify(step.correctOrder);
  results.push({ correct: false, label: 'CPR order — time ran out' });

  const btn = document.getElementById('submitbtn');
  if (btn) btn.style.display = 'none';

  const correctList = step.correctOrder.map((id, i) => {
    const item = step.items.find(x => x.id === id);
    return `<div style="font-size:13px;color:#555;padding:4px 0;border-bottom:1px solid #f0eeea;line-height:1.4;"><strong style="color:#1e7a42;">${i+1}.</strong> ${item.text}</div>`;
  }).join('');

  const list = document.getElementById('draglist');
  if (list) {
    list.insertAdjacentHTML('afterend', `
      <div class="timeout-card">
        <div class="timeout-title">Time ran out</div>
        <div class="timeout-text">In a real emergency, every second counts. Review the correct order below.</div>
      </div>
      <div class="scene-card" style="margin-bottom:1rem;">
        <div class="scene-label">Correct order</div>
        ${correctList}
      </div>
      <button class="next-btn" onclick="next()">Next situation →</button>`);
  }
}

function submitDrag() {
  if (dragSubmitted) return;
  clearInterval(timerInterval);
  dragSubmitted = true;

  const step = mcSteps[current];
  const isCorrect = JSON.stringify(dragOrder) === JSON.stringify(step.correctOrder);
  results.push({ correct: isCorrect, label: 'CPR order' });

  renderDragList();

  const btn = document.getElementById('submitbtn');
  if (btn) btn.style.display = 'none';

  const correctList = step.correctOrder.map((id, i) => {
    const item = step.items.find(x => x.id === id);
    return `<div style="font-size:13px;color:#555;padding:4px 0;border-bottom:1px solid #f0eeea;line-height:1.4;"><strong style="color:#1e7a42;">${i+1}.</strong> ${item.text}</div>`;
  }).join('');

  const noteHTML = !isCorrect ? `
    <div class="scene-card" style="margin-bottom:1rem;">
      <div class="scene-label">Correct order</div>
      ${correctList}
    </div>` : '';

  const list = document.getElementById('draglist');
  if (list) {
    list.insertAdjacentHTML('afterend', `
      <div class="feedback-card ${isCorrect ? 'correct' : 'wrong'}" style="margin-bottom:1rem;">
        <div class="feedback-title">${isCorrect ? 'Correct order' : 'Not quite'}</div>
        <div class="feedback-text">${isCorrect
          ? 'Well done. You got the CPR steps in the right order. In a real emergency, muscle memory from training makes all the difference.'
          : 'The steps were not in the correct order. Review the correct sequence below and try again.'}</div>
      </div>
      ${noteHTML}
      <button class="next-btn" onclick="next()">Next situation →</button>`);
  }
}

/* Drag and drop — desktop */
function dragStart(e, id) {
  draggingIndex = dragOrder.indexOf(id);
  e.dataTransfer.effectAllowed = 'move';
}

function dragOver(e, id) {
  e.preventDefault();
  document.getElementById('ditem-' + id).classList.add('over');
}

function dragLeave(e, id) {
  document.getElementById('ditem-' + id).classList.remove('over');
}

function dragDrop(e, id) {
  e.preventDefault();
  document.getElementById('ditem-' + id).classList.remove('over');
  const targetIndex = dragOrder.indexOf(id);
  if (draggingIndex === null || draggingIndex === targetIndex) return;
  const moved = dragOrder.splice(draggingIndex, 1)[0];
  dragOrder.splice(targetIndex, 0, moved);
  draggingIndex = null;
  renderDragList();
}

/* Touch drag — mobile */
let touchDragId = null;
let touchStartY = 0;
let touchClone = null;

function touchStart(e, id) {
  if (dragSubmitted) return;
  touchDragId = id;
  touchStartY = e.touches[0].clientY;
  const el = document.getElementById('ditem-' + id);
  el.classList.add('dragging');
}

function touchMove(e) {
  if (!touchDragId) return;
  e.preventDefault();
  const touch = e.touches[0];
  const list = document.getElementById('draglist');
  const items = list.querySelectorAll('.drag-item');
  items.forEach(item => item.classList.remove('over'));

  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const target = el ? el.closest('.drag-item') : null;
  if (target && target.id !== 'ditem-' + touchDragId) {
    target.classList.add('over');
  }
}

function touchEnd(e, id) {
  if (!touchDragId || dragSubmitted) return;
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const target = el ? el.closest('.drag-item') : null;

  document.querySelectorAll('.drag-item').forEach(i => {
    i.classList.remove('dragging');
    i.classList.remove('over');
  });

  if (target) {
    const targetId = target.id.replace('ditem-', '');
    const fromIdx = dragOrder.indexOf(touchDragId);
    const toIdx = dragOrder.indexOf(targetId);
    if (fromIdx !== -1 && toIdx !== -1 && fromIdx !== toIdx) {
      const moved = dragOrder.splice(fromIdx, 1)[0];
      dragOrder.splice(toIdx, 0, moved);
    }
  }

  touchDragId = null;
  renderDragList();
}

function renderSummary(content) {
  clearInterval(timerInterval);
  setProgress(100);
  document.getElementById('bar-title').textContent = 'Results';
  const score = results.filter(r => r.correct).length;
  const total = results.length;
  let msg = '';
  if (score === total) msg = 'All correct — excellent work.';
  else if (score >= 3) msg = 'Good. Review the situations you missed.';
  else msg = 'Go through this scenario with your zone leader at the debrief.';

  const reviewItems = results.map((r, i) => `
    <div class="review-item">
      <div class="review-dot ${r.correct ? 'correct' : 'wrong'}"></div>
      <div class="review-text">Situation ${i + 1}${r.label ? ' — ' + r.label : ''} — ${r.correct ? 'correct response' : 'review recommended'}</div>
    </div>`).join('');

  content.innerHTML = `
    <div class="summary-wrap">
      <div class="step-label">Scenario complete</div>
      <div class="summary-score">${score}/${total}</div>
      <div class="summary-sub">${msg}</div>
    </div>
    <div class="review-list">${reviewItems}</div>
    <div class="divider"></div>
    <button class="restart-btn" onclick="restart()">Restart scenario</button>`;
}

function startScenario() {
  current = 0; selected = null; results = []; dragOrder = [];
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function choose(i) {
  if (selected !== null) return;
  selected = i;
  results.push({ correct: mcSteps[current].choices[i].correct });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function next() {
  current++; selected = null; dragOrder = [];
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  clearInterval(timerInterval);
  current = -1; selected = null; results = []; dragOrder = []; timedOut = false; dragSubmitted = false;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
